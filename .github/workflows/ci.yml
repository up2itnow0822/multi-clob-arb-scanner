name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Syntax check
        run: python -m py_compile arb_scanner.py && echo "Syntax OK"

      - name: Lint with flake8
        run: |
          # E221/E241: alignment spaces, E127: indent, W503/E501: line length
          # F541: empty f-string (cosmetic in this codebase)
          flake8 arb_scanner.py --max-line-length=120 \
            --ignore=E501,W503,E221,E241,E127,F541
